# Binwak - Nginx config for direct IP access without HTTPS.
# Purpose: testing before ICP filing is approved.
# Usage:
#   sudo cp nginx-ip.conf /etc/nginx/sites-available/binwak
#   sudo ln -s /etc/nginx/sites-available/binwak /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_SERVER_IP;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Admin API — reachable only via SSH tunnel to 127.0.0.1:3000, never over
    # the public internet. Blocked at the edge; the tunnel bypasses Nginx.
    location /api/admin {
        deny all;
    }

    # API reverse proxy
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support if needed
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static image files served directly by Nginx for better performance
    location /uploads/ {
        alias /path/to/app/server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Prevent directory listing
        autoindex off;
    }

    # Health check endpoint
    location /api/health {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }
}
