version: 2
updates:
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    groups:
      npm_and_yarn:
        patterns:
          - "*"
    ignore:
      # The uni-app (@dcloudio/*) toolchain ships as pre-release "alpha" builds
      # whose version strings sort NON-monotonically: npm treats the 2021 build
      # `...-alpha-3000020210521001` as HIGHER than the 2026 build
      # `...-alpha-1000920260626810`. Left alone, Dependabot "upgrades" the
      # plugins to that older alpha, which peer-requires vite@2 and then
      # conflicts with the vite@8 the current toolchain needs -> `npm ci`
      # ERESOLVE. These packages must only move together, by hand:
      - dependency-name: "@dcloudio/*"
      # vite is pinned by the @dcloudio toolchain (currently vite@8); don't let
      # Dependabot bump it on its own.
      - dependency-name: vite
      # vitest must stay on the vite-compatible line; block majors.
      - dependency-name: vitest
        update-types:
          - version-update:semver-major
