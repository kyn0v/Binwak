version: 2
updates:
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /admin
    schedule:
      interval: weekly
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    groups:
      npm_and_yarn:
        patterns:
          - "*"
    ignore:
      # @dcloudio/vite-plugin-uni pins peer vite to an EXACT version (5.2.8),
      # so any vite update — including patch — breaks `npm ci` with ERESOLVE.
      # Pin vite entirely; it can only move when the uni-app toolchain does.
      - dependency-name: vite
