version: 2
updates:
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    groups:
      npm_and_yarn:
        patterns:
          - "*"
    ignore:
      # The uni-app toolchain pins several peers to EXACT versions, so any bump
      # of these breaks `npm ci` with ERESOLVE/EBADPLATFORM. They can only move
      # when @dcloudio/* itself does, so let dependabot stop proposing them:
      #
      #  - vite: @dcloudio/vite-plugin-uni pins peer vite@5.2.8 exactly.
      #  - @dcloudio/types: @dcloudio/uni-app pins peer @dcloudio/types@3.4.28.
      #  - vitest: v4 pulls a nested vite 7 whose esbuild 0.28 foreign-platform
      #    binaries npm marks "extraneous", breaking `npm ci` on the Linux CI
      #    runner (EBADPLATFORM). Stay on the vite-5-compatible vitest 3 line.
      - dependency-name: vite
      - dependency-name: "@dcloudio/types"
      - dependency-name: vitest
        update-types:
          - version-update:semver-major
    # 安全补丁自动合并配置
    auto-merge:
      # 自动创建 PR
      allow-conditions:
        - dependency-type: "indirect"
          update-type: "patch"
        - dependency-type: "direct"
          update-type: "patch"
          # 仅自动合并安全修复
          commit-message-prefix: "fix(security)"
