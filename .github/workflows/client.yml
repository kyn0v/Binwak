name: Client

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'shared/**'
      - '.github/workflows/client.yml'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - 'shared/**'
  workflow_dispatch:

concurrency:
  group: client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix client

      - name: Run tests
        run: npm --prefix client run test

      - name: Build (mp-weixin)
        run: cd client && npx uni build -p mp-weixin --mode development

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Inject WX_APPID into manifest
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
        run: |
          if [ -z "$WX_APPID" ]; then
            echo "Missing WX_APPID secret"; exit 1
          fi
          sed -i "s/YOUR_WX_APPID/${WX_APPID}/g" client/src/manifest.json
          grep -q "${WX_APPID}" client/src/manifest.json || { echo "Failed to inject WX_APPID"; exit 1; }

      - name: Build mp-weixin
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_APP_CHANNEL: beta
        run: cd client && npx uni build -p mp-weixin --mode development

      - name: Install miniprogram-ci
        run: cd client && npm install miniprogram-ci --no-save

      - name: Upload to WeChat
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_UPLOAD_KEY: ${{ secrets.WX_UPLOAD_KEY }}
          VERSION: "1.0.${{ github.run_number }}"
          UPLOAD_DESC: "CI #${{ github.run_number }} - ${{ github.event.head_commit.message }}"
        run: cd client && node upload.js
