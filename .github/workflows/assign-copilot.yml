name: Auto-assign Security Issues to Copilot

on:
  issues:
    types: [opened, reopened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  assign-to-copilot:
    # Auto-assign issues with 'security' and 'dependencies' labels to Copilot agent
    if: contains(github.event.issue.labels.*.name, 'security') && contains(github.event.issue.labels.*.name, 'dependencies')
    runs-on: ubuntu-latest
    steps:
      - name: Assign issue to GitHub Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            
            // Add 'copilot' label
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['copilot']
            });
            
            console.log(`✅ Issue #${issue.number} labeled with 'copilot' for Copilot agent`);
            
            // Optional: Add comment to notify Copilot
            await github.rest.issues.createComment({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              body: `@GitHub-Copilot Please help fix this dependency vulnerability. Create a PR with all necessary updates and verification.`
            });
