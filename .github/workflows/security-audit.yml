name: Security Audit

on:
  schedule:
    # Runs every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: [client, server, admin]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix ${{ matrix.directory }}

      - name: Run npm audit
        id: audit
        run: |
          set +e
          cd "${{ matrix.directory }}"
          AUDIT_JSON=$(npm audit --json 2>/dev/null || echo '{}')
          DELIMITER="EOF_$(openssl rand -hex 8)"
          echo "audit_result<<$DELIMITER" >> "$GITHUB_OUTPUT"
          echo "$AUDIT_JSON" >> "$GITHUB_OUTPUT"
          echo "$DELIMITER" >> "$GITHUB_OUTPUT"

          # Count vulnerabilities
          TOTAL=$(echo "$AUDIT_JSON" | jq -r '.metadata.vulnerabilities.total // 0')
          CRITICAL=$(echo "$AUDIT_JSON" | jq -r '.metadata.vulnerabilities.critical // 0')
          HIGH=$(echo "$AUDIT_JSON" | jq -r '.metadata.vulnerabilities.high // 0')
          MODERATE=$(echo "$AUDIT_JSON" | jq -r '.metadata.vulnerabilities.moderate // 0')

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "moderate=$MODERATE" >> "$GITHUB_OUTPUT"
          set -e

      - name: Create issue for vulnerabilities
        if: steps.audit.outputs.total > 0 && (steps.audit.outputs.critical > 0 || steps.audit.outputs.high > 0)
        uses: actions/github-script@v7
        with:
          script: |
            const dir = '${{ matrix.directory }}';
            const total = '${{ steps.audit.outputs.total }}';
            const critical = '${{ steps.audit.outputs.critical }}';
            const high = '${{ steps.audit.outputs.high }}';
            const moderate = '${{ steps.audit.outputs.moderate }}';

            const severity = critical > 0 ? '🔴 CRITICAL' : '🟠 HIGH';
            const title = `${severity}: Fix ${total} vulnerabilities in ${dir}/`;

            const body = `## Security Audit Report

            ### Statistics
            - **Critical**: ${critical}
            - **High**: ${high}
            - **Moderate**: ${moderate}
            - **Total**: ${total}

            ### Directory
            \`${dir}/\`

            ### Task
            Create a PR to fix the above vulnerabilities.

            ### Verification Checklist
            - [ ] Local \`npm ci --prefix ${dir}\` succeeds
            - [ ] Local \`npm run test\` passes all tests
            - [ ] Local \`npm run build\` production build succeeds
            - [ ] No new TypeScript errors

            ---
            *This issue was generated by the automated workflow \`security-audit.yml\`*`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['security', 'dependencies'],
              state: 'open',
            });

            // Check if a similar open issue already exists
            const exists = issues.data.some(issue =>
              issue.title.includes(`${dir}/`) && issue.title.includes('vulnerabilities')
            );

            if (!exists) {
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'dependencies'],
              });

              console.log(`Created issue #${newIssue.data.number}`);
            } else {
              console.log('Similar issue already exists, skipping creation');
            }
