name: Update Server Secret

# Manually-triggered maintenance workflow to push the WX_SECRET (WeChat
# AppSecret) from GitHub Secrets into the production server's .env and restart
# the backend. Use this after rotating/resetting the AppSecret in the WeChat
# console.
#
# This is intentionally SEPARATE from the deploy pipeline so it never runs
# automatically — it only does anything when you click "Run workflow".
#
# Prerequisite: set the `WX_SECRET` value under
#   Settings -> Secrets and variables -> Actions
# (along with the existing DEPLOY_* secrets).

on:
  workflow_dispatch:
    inputs:
      restart:
        description: 'Restart the backend after updating (recommended)'
        type: boolean
        default: true

concurrency:
  group: update-secret
  cancel-in-progress: false

jobs:
  update-secret:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_SERVER_PATH: ${{ secrets.DEPLOY_SERVER_PATH }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      WX_SECRET: ${{ secrets.WX_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          missing=0
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_SERVER_PATH DEPLOY_SSH_PRIVATE_KEY WX_SECRET; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          user: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT }}
          private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Update WX_SECRET in server .env and restart
        env:
          RESTART: ${{ inputs.restart }}
        run: |
          set -euo pipefail
          # Encode the secret as base64 so it transfers with no escaping issues
          # and is never placed on the remote process command line.
          B64="$(printf '%s' "$WX_SECRET" | base64 | tr -d '\n')"

          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s <<REMOTE
          set -euo pipefail
          NEW_SECRET="\$(printf '%s' '${B64}' | base64 -d)"
          if [ -z "\$NEW_SECRET" ]; then
            echo "Refusing to write an empty WX_SECRET" >&2
            exit 1
          fi
          cd '${DEPLOY_SERVER_PATH}'
          touch .env
          cp .env ".env.bak.\$(date +%Y%m%d-%H%M%S)"
          # Replace only the WX_SECRET line, keep everything else.
          grep -vE '^WX_SECRET=' .env > .env.tmp || true
          printf 'WX_SECRET=%s\n' "\$NEW_SECRET" >> .env.tmp
          mv .env.tmp .env
          echo "WX_SECRET updated in ${DEPLOY_SERVER_PATH}/.env"
          if [ '${RESTART}' = 'true' ]; then
            pm2 restart binwak-api --update-env
            echo "Backend restarted"
          else
            echo "Skipped restart (restart input was false)"
          fi
          REMOTE

      - name: Health check
        if: ${{ inputs.restart }}
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "for i in 1 2 3 4 5; do \
               if curl -fsS --max-time 10 http://127.0.0.1:3000/api/health >/dev/null; then \
                 curl -fsS --max-time 10 http://127.0.0.1:3000/api/health; exit 0; \
               fi; sleep 2; \
             done; echo 'Health check failed' >&2; exit 1"
